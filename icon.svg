<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1fa8"/>
      <stop offset="100%" style="stop-color:#7c5af7"/>
    </linearGradient>
    <linearGradient id="card1g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="card2g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="emboss">
      <feDropShadow dx="-2" dy="-2" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.3"/>
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Shine overlay top -->
  <ellipse cx="200" cy="80" rx="220" ry="100" fill="white" opacity="0.07"/>

  <!-- Back card (shadow card) -->
  <rect x="155" y="140" width="230" height="165" rx="22"
    fill="url(#card1g)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"
    filter="url(#shadow)" transform="rotate(-8 270 222)"/>

  <!-- Front card -->
  <rect x="130" y="165" width="240" height="168" rx="22"
    fill="url(#card2g)" stroke="rgba(255,255,255,0.3)" stroke-width="2"
    filter="url(#emboss)"/>

  <!-- Card lines (text placeholder) -->
  <rect x="158" y="208" width="130" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="158" y="228" width="90" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="158" y="246" width="110" height="8" rx="4" fill="white" opacity="0.3"/>

  <!-- Small dot accent -->
  <circle cx="310" cy="228" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="310" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" opacity="0.9">EN</text>

  <!-- Bottom line divider -->
  <line x1="130" y1="358" x2="382" y2="358" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- V.U bottom right -->
  <text x="368" y="430"
    text-anchor="end"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="52"
    font-weight="800"
    fill="white"
    opacity="0.92"
    letter-spacing="2">V.U</text>

  <!-- Bottom right glow -->
  <ellipse cx="400" cy="440" rx="90" ry="60" fill="rgba(255,255,255,0.05)"/>
</svg>
