<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2520"/>
      <stop offset="50%" style="stop-color:#3a3028"/>
      <stop offset="100%" style="stop-color:#1e1a16"/>
    </linearGradient>
    <linearGradient id="card1g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a4820"/>
      <stop offset="100%" style="stop-color:#4a2810"/>
    </linearGradient>
    <linearGradient id="card2g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8943a"/>
      <stop offset="100%" style="stop-color:#a05a20"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="frontshadow">
      <feDropShadow dx="-3" dy="-3" stdDeviation="5" flood-color="#e8943a" flood-opacity="0.3"/>
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="steamblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="textglow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#e8943a" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shimmer)"/>
  <ellipse cx="256" cy="260" rx="210" ry="170" fill="#c8813a" opacity="0.06"/>

  <!-- === COFFEE CUP (right side) === -->
  <ellipse cx="368" cy="328" rx="50" ry="9" fill="#2a1408" opacity="0.95"/>
  <path d="M328 270 Q326 326 332 334 Q346 342 368 342 Q390 342 402 334 Q408 326 406 270 Z"
    fill="#4a2810" stroke="#7a4820" stroke-width="2.5"/>
  <ellipse cx="368" cy="272" rx="36" ry="8" fill="#1e0e04"/>
  <ellipse cx="368" cy="272" rx="32" ry="6.5" fill="#2e1206" opacity="0.95"/>
  <ellipse cx="365" cy="271" rx="17" ry="4.5" fill="#c8813a" opacity="0.3" transform="rotate(-12 365 271)"/>
  <path d="M404 283 Q432 283 432 300 Q432 318 404 318" fill="none" stroke="#4a2810" stroke-width="11" stroke-linecap="round"/>
  <path d="M404 283 Q426 283 426 300 Q426 318 404 318" fill="none" stroke="#6b3a1a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Steam -->
  <path d="M348 258 Q343 242 348 226 Q353 210 348 194" fill="none" stroke="#d4874a" stroke-width="3.5" stroke-linecap="round" opacity="0.45" filter="url(#steamblur)"/>
  <path d="M368 254 Q363 238 368 222 Q373 206 368 190" fill="none" stroke="#d4874a" stroke-width="3.5" stroke-linecap="round" opacity="0.38" filter="url(#steamblur)"/>
  <path d="M388 258 Q383 242 388 226 Q393 210 388 194" fill="none" stroke="#d4874a" stroke-width="3.5" stroke-linecap="round" opacity="0.3" filter="url(#steamblur)"/>

  <!-- === BACK CARD === -->
  <rect x="70" y="145" width="235" height="168" rx="22"
    fill="url(#card1g)"
    stroke="rgba(200,129,58,0.4)" stroke-width="2"
    filter="url(#cardshadow)"
    transform="rotate(-10 187 229)"/>

  <!-- === FRONT CARD === -->
  <rect x="52" y="172" width="242" height="170" rx="22"
    fill="url(#card2g)"
    stroke="rgba(255,210,140,0.55)" stroke-width="2.5"
    filter="url(#frontshadow)"/>

  <!-- Card shine -->
  <rect x="52" y="172" width="242" height="55" rx="22" fill="white" opacity="0.08"/>

  <!-- Kelime Kartları text on card -->
  <text x="173" y="245"
    text-anchor="middle"
    font-family="'Joehand','Segoe Script','Comic Sans MS',cursive"
    font-size="26"
    font-weight="bold"
    fill="white"
    opacity="0.95"
    filter="url(#textglow)">Kelime</text>
  <text x="173" y="278"
    text-anchor="middle"
    font-family="'Joehand','Segoe Script','Comic Sans MS',cursive"
    font-size="26"
    font-weight="bold"
    fill="white"
    opacity="0.95"
    filter="url(#textglow)">Kartlari</text>

  <!-- Card bottom line accent -->
  <line x1="90" y1="308" x2="256" y2="308" stroke="rgba(255,210,140,0.3)" stroke-width="1.5"/>

  <!-- V.U small corner - bottom right -->
  <text x="466" y="482"
    text-anchor="end"
    font-family="'Joehand','Segoe Script','Comic Sans MS',cursive"
    font-size="30"
    font-weight="bold"
    font-style="italic"
    fill="#ffd166"
    opacity="0.95">V.U</text>

</svg>
